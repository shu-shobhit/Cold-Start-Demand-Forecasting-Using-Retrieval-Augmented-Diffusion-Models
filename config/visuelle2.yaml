
# Visuelle 2.0 cold-start / few-shot configuration for RATD_Fashion.
#
# Key dimensions:
#   pred_len  = 12  (full 12-week fashion season)
#   K         =  2  (channels: sales + discount)
#   k_refs    =  3  (retrieved reference trajectories per product)
#   ref_size  = 12  (single reference trajectory length = pred_len)
#   h_size    =  0  (no separate history window; gt_mask controls conditioning)
#   n_obs     = 0-4 (weeks of sales history observed at inference)
#
# ref_size * 3 = 36 = total reference tensor length per sample.

train:
  epochs: 200
  batch_size: 64
  lr: 1.0e-3
  itr_per_epoch: 1.0e+8

diffusion:
  layers: 4
  channels: 64
  nheads: 8
  diffusion_embedding_dim: 128
  beta_start: 0.0001
  beta_end: 0.5
  num_steps: 50
  schedule: "quad"
  is_linear: False
  # Sequence-length parameters (set to match Visuelle 2 season length)
  h_size: 0       # observed history length (masking handles n_obs variation)
  ref_size: 12    # single reference trajectory length (= pred_len)

model:
  is_unconditional: 0
  timeemb: 128
  featureemb: 16
  target_strategy: "test"   # not used by RATD_Fashion but required by RATD_base
  use_reference: True
  # Product attributes are injected via RMA cross-attention (path b) only.
