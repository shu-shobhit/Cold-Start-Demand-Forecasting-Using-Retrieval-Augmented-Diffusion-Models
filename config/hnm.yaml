
# H&M cold-start / few-shot configuration for RATD_HnM.
#
# Key dimensions:
#   pred_len  = 12  (12 bi-weekly periods after launch)
#   K         =  1  (channel: sales only)
#   k_refs    =  3  (retrieved reference trajectories per article)
#   ref_size  = 12  (single reference trajectory length = pred_len)
#   h_size    =  0  (no separate history window; gt_mask controls conditioning)
#
# ref_size * 3 = 36 = total reference tensor length per sample.
#
# Sales are log1p-transformed then StandardScaled; scaler.pkl must exist
# in hnm_processed/ before training.

train:
  epochs: 100
  batch_size: 32
  lr: 1.0e-3
  itr_per_epoch: 1.0e+8

diffusion:
  layers: 4
  channels: 64
  nheads: 8
  diffusion_embedding_dim: 128
  beta_start: 0.0001
  beta_end: 0.5
  num_steps: 50
  schedule: "quad"
  is_linear: False
  h_size: 0       # observed history controlled by gt_mask
  ref_size: 12    # single reference trajectory length (= pred_len)

model:
  is_unconditional: 0
  timeemb: 128
  featureemb: 16
  target_strategy: "test"   # required by RATD_base; not used by RATD_HnM
  use_reference: True
  attr_dim: 513             # CLIP text (512) + price scalar (1)
